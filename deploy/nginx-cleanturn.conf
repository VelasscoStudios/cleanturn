# Reverse proxy: public :80 -> app on 127.0.0.1:3100.
# Installed by deploy/bootstrap.sh to /etc/nginx/sites-available/cleanturn.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Overwrite (not append) X-Forwarded-For with the real peer address, so
        # the app's per-IP rate limit sees a trustworthy client IP that a
        # client cannot spoof through this proxy.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
